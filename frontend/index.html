<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
</head>
<body>

<h1>AI Chatbot</h1>

<button onclick="chat()">Chat</button>

<p id="output"></p>

<script>
async function chat() {
    const response = await fetch("http://localhost:5000/chat");
    const data = await response.json();

    document.getElementById("output").innerText = data.message;
}
</script>

</body>
</html>
